name: astro-gpu
channels:
  - rapidsai
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pandas>=2.0.0
  - numpy>=1.24.0
  - scikit-learn>=1.3.0
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  # RAPIDS 依赖（匹配 CUDA 版本，这里以 CUDA 11.8 为例）
  - rapids=23.10
  - cudatoolkit=11.8
  - pip
  - pip:
    - cupy-cuda11x>=12.2.0